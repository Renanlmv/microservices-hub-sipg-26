name: ci - ms-pedido

on:
  pull_request:
    branches: ["main"]
    paths:
      - "ms-pedido/**"
      - ".github/workflows/**"

jobs:
  test-ms-pedido:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: "21"
      - name: Testes (ms-pedido)
        run: mvn -f ms-pedido/pom.xml -B test
