name: CI - ms-pagamento (unit)

on: 
  pull_request:
    branches: ["main"]
    paths:
      - "ms-pagamento/**"
      - ".github/workflows/**"
  push:
    branches: ["main"]
    paths:
      - "ms-pagamento/**"
      - ".github/workflows/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      
      - name: Unit tests (ms-pagamento)
        run: mvn -f ms-pagamento/pom.xml -B test
